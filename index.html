<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARYA | AI-ML Portfolio</title>
    <style>
        body {
            background: #0f172a; /* Dark tech background */
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05); /* Modern glass look */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { color: #38bdf8; font-size: 2.5em; margin-bottom: 0.5em; }
        .tech-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        input[type="checkbox"] { accent-color: #38bdf8; }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #7dd3fc; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ARYA</h1>
        <p>1st Year AI-ML Diploma Student</p>

        <div class="tech-box">
            <h3>Skills & Interests</h3>
            <input type="checkbox" checked> Artificial Intelligence<br>
            <input type="checkbox" checked> Machine Learning<br>
            <input type="checkbox"> Genomics & Bioinformatics<br>
            <input type="checkbox"> Advanced Python
        </div>

        <button onclick="alert('System Online!')">Initialize AI Model</button>

        <hr style="margin-top: 30px; border: 0.5px solid rgba(255,255,255,0.1);">
        <p style="font-size: 0.8em; color: #94a3b8;">Hosted via GitHub Pages</p>
    </div>

</body>
</html>
